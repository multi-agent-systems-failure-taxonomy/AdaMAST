<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>AdaMAST taxonomy field guide</title>
  <style>
    :root {
      --canvas: #eef2f8;
      --paper: #fbfcff;
      --ink: #17223c;
      --muted: #64708a;
      --line: #d9e0ec;
      --blue: #3158d8;
      --blue-soft: #e8edff;
      --a: #d95d45;
      --a-soft: #fff0ec;
      --b: #3274b9;
      --b-soft: #eaf5ff;
      --c: #547f5a;
      --c-soft: #edf7ee;
      --other: #7a6a98;
      --other-soft: #f4effb;
      --shadow: 0 18px 54px rgba(42, 59, 96, 0.10);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html {
      background: var(--canvas);
      color: var(--ink);
      font-family: "Aptos", "Segoe UI Variable", "Segoe UI", sans-serif;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 300px;
      background:
        linear-gradient(90deg, rgba(49, 88, 216, 0.055) 1px, transparent 1px) 0 0 / 32px 32px,
        linear-gradient(rgba(49, 88, 216, 0.04) 1px, transparent 1px) 0 0 / 32px 32px,
        var(--canvas);
    }

    button, input { font: inherit; }
    button { color: inherit; }

    .shell {
      width: min(1380px, calc(100% - 40px));
      margin: 28px auto 64px;
    }

    .masthead {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      min-height: 270px;
      background: var(--paper);
      border: 1px solid rgba(23, 34, 60, 0.10);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .masthead::after {
      content: "";
      position: absolute;
      width: 330px;
      height: 330px;
      right: -160px;
      top: -170px;
      border: 58px solid var(--blue-soft);
      border-radius: 50%;
      pointer-events: none;
    }

    .spine {
      display: grid;
      align-content: space-between;
      padding: 24px 0;
      background: var(--ink);
      color: white;
      text-align: center;
    }

    .spine-mark {
      font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      writing-mode: vertical-rl;
      justify-self: center;
      opacity: 0.72;
    }

    .spine-categories {
      display: grid;
      gap: 8px;
      justify-content: center;
    }

    .spine-categories span {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255,255,255,.26);
      border-radius: 50%;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 13px;
      font-weight: 700;
    }

    .hero {
      position: relative;
      z-index: 1;
      display: grid;
      align-content: space-between;
      gap: 38px;
      padding: 34px 42px 32px;
    }

    .brandline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand::before {
      content: "";
      width: 28px;
      height: 4px;
      border-radius: 8px;
      background: var(--blue);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: #2347ba;
      font-size: 12px;
      font-weight: 750;
      letter-spacing: 0.035em;
      text-transform: uppercase;
    }

    .status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .status.review {
      color: #9b431f;
      background: #fff0e8;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      max-width: 980px;
      margin-bottom: 12px;
      font-family: "Aptos Display", "Segoe UI Variable Display", "Segoe UI", sans-serif;
      font-size: clamp(38px, 5.2vw, 72px);
      line-height: 0.98;
      font-weight: 740;
      letter-spacing: -0.045em;
    }

    .summary {
      max-width: 820px;
      margin-bottom: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
    }

    .facts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 26px;
      color: var(--muted);
      font-size: 13px;
    }

    .facts strong {
      color: var(--ink);
      font-weight: 700;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(230px, 0.36fr) minmax(0, 1fr);
      gap: 20px;
      margin-top: 20px;
      align-items: start;
    }

    .panel {
      background: rgba(251, 252, 255, 0.96);
      border: 1px solid rgba(23, 34, 60, 0.10);
      border-radius: var(--radius);
      box-shadow: 0 10px 35px rgba(42, 59, 96, 0.07);
    }

    .sidebar {
      position: sticky;
      top: 20px;
      padding: 22px;
    }

    .eyebrow {
      display: block;
      margin-bottom: 8px;
      color: var(--blue);
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .sidebar h2 {
      margin-bottom: 18px;
      font-size: 24px;
      letter-spacing: -0.025em;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 22px;
    }

    .metric {
      padding: 13px;
      border-radius: 12px;
      background: #f1f4fa;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 5px;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 18px;
    }

    .filter-label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .search {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      color: var(--ink);
      background: white;
      border: 1px solid var(--line);
      border-radius: 11px;
      outline: none;
    }

    .search:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(49, 88, 216, 0.13);
    }

    .categories {
      display: grid;
      gap: 7px;
      margin-top: 12px;
    }

    .category {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      cursor: pointer;
      text-align: left;
    }

    .category:hover { background: #f1f4fa; }

    .category.active {
      color: var(--blue);
      background: var(--blue-soft);
      border-color: #cdd8ff;
    }

    .category b {
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 12px;
    }

    .category span {
      color: var(--muted);
      font-size: 12px;
    }

    .catalog { padding: 28px; }

    .catalog-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
    }

    .catalog-heading h2 {
      margin-bottom: 0;
      font-size: 28px;
      letter-spacing: -0.03em;
    }

    .result-count {
      color: var(--muted);
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 12px;
    }

    .code-list { display: grid; gap: 10px; }

    .code {
      --category-color: var(--other);
      --category-soft: var(--other-soft);
      position: relative;
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .code:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--category-color) 45%, var(--line));
      box-shadow: 0 10px 28px rgba(42, 59, 96, 0.08);
    }

    .code[data-category="A"] { --category-color: var(--a); --category-soft: var(--a-soft); }
    .code[data-category="B"] { --category-color: var(--b); --category-soft: var(--b-soft); }
    .code[data-category="C"] { --category-color: var(--c); --category-soft: var(--c-soft); }

    .code-rail {
      display: grid;
      align-content: start;
      gap: 10px;
      padding: 18px 12px;
      background: var(--category-soft);
      border-right: 1px solid color-mix(in srgb, var(--category-color) 24%, white);
    }

    .category-letter {
      color: var(--category-color);
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .code-id {
      color: var(--category-color);
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 11px;
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .code-body { padding: 18px 20px 19px; }

    .code-body h3 {
      margin-bottom: 7px;
      font-size: 18px;
      line-height: 1.28;
      letter-spacing: -0.018em;
    }

    .code-body p {
      margin-bottom: 0;
      color: #536078;
      font-size: 14px;
      line-height: 1.58;
    }

    details {
      margin-top: 12px;
      padding-top: 11px;
      border-top: 1px solid var(--line);
    }

    summary {
      color: var(--category-color);
      cursor: pointer;
      font-size: 12px;
      font-weight: 750;
    }

    .extra-grid {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .extra {
      display: grid;
      grid-template-columns: minmax(90px, 0.25fr) minmax(0, 1fr);
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .extra b { color: var(--ink); }
    .extra code { white-space: pre-wrap; overflow-wrap: anywhere; }

    .empty {
      padding: 70px 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 14px;
    }

    .footer {
      padding: 22px 4px 0;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 820px) {
      .shell { width: min(100% - 20px, 1380px); margin-top: 10px; }
      .masthead { grid-template-columns: 54px minmax(0, 1fr); border-radius: 18px; }
      .spine-categories span { width: 28px; height: 28px; }
      .hero { padding: 24px 22px; }
      .brandline { align-items: flex-start; }
      .workspace { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .catalog { padding: 20px 14px; }
    }

    @media (max-width: 520px) {
      h1 { font-size: 37px; }
      .status { align-self: flex-start; }
      .brandline { flex-direction: column; }
      .facts { display: grid; gap: 7px; }
      .code { grid-template-columns: 66px minmax(0, 1fr); }
      .code-body { padding: 16px 14px; }
      .extra { grid-template-columns: 1fr; gap: 3px; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .code { transition: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <div class="spine" aria-hidden="true">
        <span class="spine-mark">FAILURE FIELD GUIDE</span>
        <div class="spine-categories"><span>A</span><span>B</span><span>C</span></div>
      </div>
      <div class="hero">
        <div class="brandline">
          <div class="brand">AdaMAST · BASELINE</div>
          <div class="status" id="status">Generated</div>
        </div>
        <div>
          <h1 id="title">Generated failure taxonomy</h1>
          <p class="summary" id="summary"></p>
        </div>
        <div class="facts" id="facts"></div>
      </div>
    </header>

    <main class="workspace">
      <aside class="panel sidebar">
        <span class="eyebrow">Taxonomy index</span>
        <h2>Navigate codes</h2>
        <div class="metrics" id="metrics"></div>
        <label class="filter-label" for="search">Search the field guide</label>
        <input class="search" id="search" type="search" placeholder="ID, name, or description">
        <div class="categories" id="categories" aria-label="Filter by category"></div>
      </aside>

      <section class="panel catalog" aria-labelledby="catalog-title">
        <div class="catalog-heading">
          <div>
            <span class="eyebrow">Failure modes</span>
            <h2 id="catalog-title">Code catalog</h2>
          </div>
          <div class="result-count" id="result-count"></div>
        </div>
        <div class="code-list" id="code-list"></div>
        <div class="empty" id="empty" hidden>No codes match this filter.</div>
      </section>
    </main>
    <footer class="footer">Read-only local artifact · no runtime state or activation controls</footer>
  </div>

  <script type="application/json" id="adamast-payload">__ADAMAST_TAXONOMY_PAYLOAD__</script>
  <script>
    (() => {
      const payload = JSON.parse(document.getElementById("adamast-payload").textContent);
      const taxonomy = payload.taxonomy || {};
      const manifest = payload.manifest || {};
      const codes = Array.isArray(taxonomy.codes) ? taxonomy.codes : [];
      const acceptance = manifest.acceptance || {};
      const state = { query: "", category: "all" };

      const byId = (id) => document.getElementById(id);
      const text = (value, fallback = "") => value === undefined || value === null ? fallback : String(value);
      const displayNumber = (value) => {
        const number = Number(value);
        return Number.isFinite(number) ? number.toFixed(2) : "—";
      };

      const status = text(taxonomy.status || manifest.status, "generated");
      const statusNode = byId("status");
      statusNode.textContent = status.replaceAll("_", " ");
      if (status !== "accepted") statusNode.classList.add("review");

      byId("title").textContent = text(taxonomy.display_name, "Generated failure taxonomy");
      byId("summary").textContent = text(
        taxonomy.summary,
        "A read-only field guide to the generated failure modes."
      );

      const facts = [
        ["Domain", taxonomy.domain || "Not specified"],
        ["Strategy", taxonomy.strategy || manifest.strategy || "baseline"],
        ["Schema", taxonomy.schema_version || "1"],
        ["Provider", taxonomy.generation?.provider || manifest.request?.provider || "Not recorded"],
        ["Model", taxonomy.generation?.model || manifest.request?.model || "Not recorded"]
      ];
      for (const [label, value] of facts) {
        const item = document.createElement("span");
        const strong = document.createElement("strong");
        strong.textContent = `${label}: `;
        item.append(strong, document.createTextNode(text(value)));
        byId("facts").append(item);
      }

      const categoryCounts = codes.reduce((result, code) => {
        const category = text(code.category, "Other").toUpperCase();
        result[category] = (result[category] || 0) + 1;
        return result;
      }, {});

      const metricValues = [
        ["Codes", codes.length],
        ["Categories", Object.keys(categoryCounts).length],
        ["Fleiss κ", displayNumber(acceptance.final_kappa ?? taxonomy.generation?.agreement?.final_kappa)],
        ["Coverage", displayNumber(acceptance.final_coverage ?? taxonomy.generation?.agreement?.final_coverage)]
      ];
      for (const [label, value] of metricValues) {
        const metric = document.createElement("div");
        metric.className = "metric";
        const caption = document.createElement("span");
        caption.textContent = label;
        const number = document.createElement("strong");
        number.textContent = text(value);
        metric.append(caption, number);
        byId("metrics").append(metric);
      }

      const categoryEntries = [
        ["all", "All codes", codes.length],
        ...Object.entries(categoryCounts).sort(([a], [b]) => a.localeCompare(b))
          .map(([category, count]) => [category, `Category ${category}`, count])
      ];
      for (const [value, label, count] of categoryEntries) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `category${value === "all" ? " active" : ""}`;
        button.dataset.category = value;
        const name = document.createElement("b");
        name.textContent = label;
        const number = document.createElement("span");
        number.textContent = count;
        button.append(name, number);
        button.addEventListener("click", () => {
          state.category = value;
          document.querySelectorAll(".category").forEach((node) => {
            node.classList.toggle("active", node.dataset.category === value);
          });
          renderCodes();
        });
        byId("categories").append(button);
      }

      byId("search").addEventListener("input", (event) => {
        state.query = event.target.value.trim().toLocaleLowerCase();
        renderCodes();
      });

      function renderCodes() {
        const list = byId("code-list");
        list.replaceChildren();
        const visible = codes.filter((code) => {
          const category = text(code.category, "Other").toUpperCase();
          const categoryMatch = state.category === "all" || category === state.category;
          const haystack = [code.id, code.name, code.description, category]
            .map((value) => text(value).toLocaleLowerCase()).join(" ");
          return categoryMatch && (!state.query || haystack.includes(state.query));
        });

        byId("result-count").textContent = `${visible.length} of ${codes.length} codes`;
        byId("empty").hidden = visible.length !== 0;
        for (const code of visible) list.append(renderCode(code));
      }

      function renderCode(code) {
        const category = text(code.category, "Other").toUpperCase();
        const article = document.createElement("article");
        article.className = "code";
        article.dataset.category = category;

        const rail = document.createElement("div");
        rail.className = "code-rail";
        const letter = document.createElement("div");
        letter.className = "category-letter";
        letter.textContent = category;
        const codeId = document.createElement("div");
        codeId.className = "code-id";
        codeId.textContent = text(code.id, "—");
        rail.append(letter, codeId);

        const body = document.createElement("div");
        body.className = "code-body";
        const heading = document.createElement("h3");
        heading.textContent = text(code.name, "Unnamed failure mode");
        const description = document.createElement("p");
        description.textContent = text(code.description, "No description supplied.");
        body.append(heading, description);

        const primary = new Set(["id", "name", "description", "category"]);
        const extras = Object.entries(code).filter(([key, value]) => (
          !primary.has(key) && value !== null && value !== "" &&
          !(Array.isArray(value) && value.length === 0)
        ));
        if (extras.length) {
          const details = document.createElement("details");
          const summary = document.createElement("summary");
          summary.textContent = "Definition guidance";
          const grid = document.createElement("div");
          grid.className = "extra-grid";
          for (const [key, value] of extras) {
            const row = document.createElement("div");
            row.className = "extra";
            const label = document.createElement("b");
            label.textContent = key.replaceAll("_", " ");
            const content = document.createElement("code");
            content.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
            row.append(label, content);
            grid.append(row);
          }
          details.append(summary, grid);
          body.append(details);
        }

        article.append(rail, body);
        return article;
      }

      renderCodes();
    })();
  </script>
</body>
</html>
