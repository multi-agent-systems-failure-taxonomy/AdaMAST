name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build twine ".[test,docs,anthropic,bedrock]"
      - run: python -m ruff check adamast tests
      - run: python -m pytest tests -q
      - run: python scripts/build_site.py
      - name: Verify tag matches package version
        shell: bash
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$GITHUB_REF_NAME" = "v$version"
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: adamast-${{ github.ref_name }}
          path: dist/*
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          flags=(--generate-notes --verify-tag)
          if [[ "$GITHUB_REF_NAME" =~ (a|b|rc)[0-9]+$ ]]; then
            flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" dist/* "${flags[@]}"

  pypi-publish:
    needs: github-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/adamast
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: adamast-${{ github.ref_name }}
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
