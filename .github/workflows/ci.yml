name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.14"
          - os: windows-latest
            python: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test,anthropic,bedrock]"
      - run: python -m ruff check .
      # Coverage measures the single adamast package. The vendored research
      # pipeline and the ported draft/agreement engines are omitted via
      # [tool.coverage.run] in pyproject.toml; they have never been part of
      # the gate.
      - run: >-
          python -m pytest tests -q
          --cov=adamast
          --cov-report=term
          --cov-fail-under=78

  package-and-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build twine ".[docs]"
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: adamast-codex-install --help
      - run: adamast-claude-install --help
      - run: python scripts/build_site.py
