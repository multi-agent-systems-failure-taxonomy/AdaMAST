name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "website/**"
      - "scripts/build_site.py"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip ".[docs]"
      - run: python scripts/build_site.py
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  # GitHub Pages serves from the public AdaMAST repository only; in the
  # private repository this job is skipped and the build acts as a strict
  # verification gate. One workflow file keeps the publish flow a pure copy.
  deploy:
    if: github.repository == 'multi-agent-systems-failure-taxonomy/AdaMAST'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - id: deployment
        uses: actions/deploy-pages@v5
