site_name: AdaMAST
site_description: >-
  Build, evaluate, and adapt failure-mode taxonomies for LLM agents.
site_url: https://multi-agent-systems-failure-taxonomy.github.io/AdaMAST/docs/
site_dir: site/docs
repo_url: https://github.com/multi-agent-systems-failure-taxonomy/AdaMAST
repo_name: AdaMAST
edit_uri: edit/main/docs/

theme:
  name: material
  font: false
  icon:
    logo: material/radar
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.integrate
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - md_in_html

extra_css:
  - assets/stylesheets/extra.css?v=20260721-1

extra:
  generator: false

# README.md is the GitHub file-view index; it would collide with index.md
# in the built site.
exclude_docs: |
  README.md

nav:
  - Start here:
      - Overview and installation: index.md
      - Installation: INSTALLATION.md
      - Interactive setup: INTERACTIVE_SETUP.md
      - Choose a workflow: CONCEPTS.md
  - "01 · Foundation":
      - Prepare traces: TRACE_FORMATS.md
      - Generate a taxonomy: GENERATION.md
      - Agreement gate: AGREEMENT_GATE.md
      - Outputs and field guide: TAXONOMY_OUTPUTS.md
      - Providers and models: PROVIDERS.md
  - "02 · Evaluation":
      - Judge traces: JUDGING.md
      - Choose a judge: JUDGE_TYPES.md
  - "03 · Adaptive runtime":
      - Runtime overview: GETTING_STARTED.md
      - Traces and learning: TRACES_AND_LEARNING.md
      - Taxonomy lifecycle: TAXONOMIES.md
      - Single-LLM integration: SINGLE_LLM.md
      - Custom agent harness: INTEGRATION.md
      - Native taxonomy learning: NATIVE_LEARNING.md
  - "04 · Host integrations":
      - Codex: CODEX.md
      - Claude Code: CLAUDE_CODE.md
  - Operations:
      - Dashboard: DASHBOARD.md
      - Web API: WEB_API.md
      - Configuration: CONFIGURATION.md
      - Troubleshooting: TROUBLESHOOTING.md
  - Reference:
      - Runtime API: API_OR_RUNTIME.md
      - Architecture: ARCHITECTURE.md
      - Compatibility: COMPATIBILITY.md
      - Customization: CUSTOMIZATION.md
      - Complete runtime example: EXAMPLE_RUN.md
