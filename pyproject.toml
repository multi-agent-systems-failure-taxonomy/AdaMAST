[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "adamast"
version = "0.2.0.dev0"
description = "Adaptive failure-mode taxonomy generation and integration"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "openai>=1.30,<3",
]

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
]

[project.scripts]
adamast = "adamast.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
adamast = ["assets/*.html"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = ["src"]
